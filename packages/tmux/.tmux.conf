# === Migrated from: Dotfiles.zip/tmux/.tmux.conf (Catppuccin base) ===
# === Merged with:   windows-wsl/tmux.conf (TPM plugins, keybindings) ===
# === Date:          2026-06-09 ===
# Theme: Catppuccin Mocha

# ===== GENERAL SETTINGS =====

set -g mouse on

unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1

set -g renumber-windows on
set -g history-limit 50000
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -s escape-time 0
set -g display-time 4000
set -g focus-events on
setw -g aggressive-resize on

# ===== KEY BINDINGS =====

bind r source-file ~/.tmux.conf \; display "Config reloaded!"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind c new-window -c "#{pane_current_path}"

bind -n S-Left previous-window
bind -n S-Right next-window

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip.exe"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "clip.exe"

bind S setw synchronize-panes
bind x kill-pane

# ===== STATUS BAR =====

set -g status-position bottom
set -g status-interval 5

# Catppuccin Mocha theme
set -g status-style 'bg=#1e1e2e,fg=#cdd6f4'
set -g status-left-style 'bg=#f5c2e7,fg=#1e1e2e,bold'
set -g status-right-style 'bg=#1e1e2e,fg=#cdd6f4'
set -g window-status-style 'bg=#1e1e2e,fg=#cdd6f4'
set -g window-status-current-style 'bg=#f5c2e7,fg=#1e1e2e,bold'
set -g pane-border-style 'fg=#45475a'
set -g pane-active-border-style 'fg=#f5c2e7'
set -g message-style 'bg=#313244,fg=#cdd6f4'

set -g status-left-length 40
set -g status-left '#[bg=#f5c2e7,fg=#1e1e2e,bold] #S '
set -g status-right-length 150
set -g status-right '#[bg=#1e1e2e,fg=#cdd6f4] %Y-%m-%d %H:%M '

setw -g window-status-format '#[bg=#1e1e2e,fg=#cdd6f4] #I: #W '
setw -g window-status-current-format '#[bg=#f5c2e7,fg=#1e1e2e,bold] #I: #W '
setw -g window-status-separator ''

# ===== PLUGINS (TPM) =====

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'

set -g @prefix_highlight_fg 'colour232'
set -g @prefix_highlight_bg 'colour154'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=colour232,bg=colour172'
set -g @prefix_highlight_prefix_prompt 'Wait'
set -g @prefix_highlight_copy_prompt 'Copy'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
